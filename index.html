<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Energy Wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .wheel-info-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .wheel-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            flex-shrink: 0;
        }

        svg {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
        }

        .segment {
            cursor: pointer;
            transition: opacity 0.3s ease, filter 0.3s ease;
        }

        .segment:hover {
            opacity: 0.8;
            filter: brightness(1.1);
        }

        .segment-label {
            pointer-events: none;
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
            fill: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .center-circle {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .center-circle:hover {
            filter: brightness(1.2);
        }

        .center-text {
            pointer-events: none;
            font-size: 12px;
            font-weight: bold;
            text-anchor: middle;
            fill: #333;
        }

        .info-panel {
            width: 100%;
            max-width: 400px;
            max-height: 400px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .info-panel h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: inline-block;
        }

        .info-panel p {
            color: #555;
            line-height: 1.6;
            font-size: 1em;
            margin-bottom: 15px;
        }

        .welcome-message {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 20px;
        }

        /* Hazard Details Section */
        .hazard-details-section {
            width: 100%;
            margin-top: 20px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 10px;
            border-left: 5px solid;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hazard-details-header {
            color: #333;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hazard-details-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
        }

        .hazard-details-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .notes-column h4 {
            color: #555;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .notes-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.95em;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .photo-upload {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 0.9em;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .photo-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .photo-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .photo-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .photo-item .remove-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .photo-item .remove-btn:hover {
            background: rgba(255, 0, 0, 1);
        }

        .no-photos {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .save-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* Submit Section */
        .submit-section {
            width: 100%;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 3px solid #ddd;
            text-align: center;
        }

        .submit-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .submit-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            min-width: 250px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .summary-info {
            color: #666;
            margin-top: 15px;
            font-size: 0.95em;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .modal-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .modal-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .wheel-info-container {
                flex-direction: column;
                gap: 30px;
            }

            .wheel-wrapper {
                width: 300px;
                height: 300px;
            }

            .info-panel {
                max-width: 100%;
            }

            .hazard-details-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }

            .submit-btn {
                width: 100%;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Interactive Energy Wheel</h1>
        <div class="wheel-info-container">
            <div class="wheel-wrapper">
                <svg id="energyWheel" width="400" height="400" viewBox="0 0 400 400"></svg>
            </div>
            <div class="info-panel" id="infoPanel">
                <div class="welcome-message">Click on any energy type to learn more!</div>
            </div>
        </div>

        <!-- Hazard Details Section (appears when hazard is selected) -->
        <div class="hazard-details-section" id="hazardDetailsSection">
            <div class="hazard-details-header">
                <span class="hazard-details-indicator" id="hazardDetailIndicator"></span>
                <span id="hazardDetailName"></span>
            </div>
            <div class="hazard-details-content">
                <div class="notes-column">
                    <h4>📝 Comments</h4>
                    <textarea 
                        id="hazardDetailComments"
                        placeholder="Add observations, risks, and safety notes for this hazard...">
                    </textarea>
                </div>
                <div class="notes-column">
                    <h4>📸 Photos</h4>
                    <div class="photo-upload">
                        <div class="file-input-wrapper">
                            <input 
                                type="file" 
                                id="hazardDetailPhotoInput"
                                accept="image/*" 
                                multiple>
                            <label for="hazardDetailPhotoInput" class="file-input-label">Choose Photos</label>
                        </div>
                        <div class="photo-preview" id="hazardDetailPhotoPreview">
                            <div class="no-photos">No photos yet</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="save-btn-group">
                <button class="save-btn" id="saveDetailBtn">💾 Save</button>
                <button class="clear-btn" id="clearDetailBtn">✕ Clear</button>
            </div>
        </div>

        <!-- Submit Section -->
        <div class="submit-section">
            <h2>📧 Submit Assessment</h2>
            <p class="summary-info" id="summaryInfo">Ready to submit your hazard assessment?</p>
            <button class="submit-btn" id="submitBtn">📤 Send Assessment to Email</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h2>Success!</h2>
            <p id="successMessage">Your assessment has been sent to brett.galassi@ppsus.com</p>
            <button class="modal-btn" onclick="closeSuccessModal()">Close</button>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">❌</div>
            <h2>Error</h2>
            <p id="errorMessage">An error occurred while sending your assessment.</p>
            <button class="modal-btn" onclick="closeErrorModal()">Close</button>
        </div>
    </div>

    <script>
        const energyData = [
            {
                name: "Motion",
                color: "#FF6B6B",
                description: "Motion is the energy from the position change of moving objects. Moving vehicles, swaying canes, rolling carts, or opening/closing doors all create motion energy."
            },
            {
                name: "Mechanical",
                color: "#4ECDC4",
                description: "Mechanical energy comes from a powered machine and includes rotation, vibration, tension, or compression. A rock crusher or blender in your kitchen has mechanical en[...]"
            },
            {
                name: "Electrical",
                color: "#FFE66D",
                description: "Electrical energy comes from a power source, like wall outlets, generators (AC power) or batteries (DC power). It can also come from Mother Nature (lightning or stat[...]"
            },
            {
                name: "Pressure",
                color: "#95E1D3",
                description: "Pressure is an energy source created by gas or liquid under compression or vacuum. Pressure is in heavy equipment hydraulic systems or compressed air used in hand to[...]"
            },
            {
                name: "Temperature",
                color: "#F38181",
                description: "Temperature energy can be hot or cold. It can be made by humans through oven and refrigerators or made by nature in summer or winter weather exposure. It can come fr[...]"
            },
            {
                name: "Chemical",
                color: "#AA96DA",
                description: "Chemical energy comes from chemicals. It can be direct contact (when two chemicals mix and explode). Chemical energy not in direct contact (when two chemicals can af[...]"
            },
            {
                name: "Radiation",
                color: "#FCBAD3",
                description: "Radiation energy examples include nuclear sources, like X-ray machines or nuclear reactors. Work on cell towers may cause exposure to microwave radiation sources and[...]"
            },
            {
                name: "Biological",
                color: "#A8E6CF",
                description: "Biological energy includes viruses, mold, bacteria, plants (poison ivy), animals (snakes, dogs, spiders, wasps), insects (wasps). Another biological source is the hu[...]"
            },
            {
                name: "Sound",
                color: "#FFD3B6",
                description: "Sound energy is mainly high noise. Sound cannot only harm ears, but causes high blood pressure, insomnia, and other medical issues. Sound also affects communication [...]"
            },
            {
                name: "Gravity",
                color: "#FFAAA5",
                description: "Gravity is a natural energy source that causes objects to fall to the ground. When you lean your shovel against the fence and it falls over, gravity is the cause. Wh[...]"
            }
        ];

        const canvas = document.getElementById('energyWheel');
        const infoPanel = document.getElementById('infoPanel');
        const hazardDetailsSection = document.getElementById('hazardDetailsSection');
        const hazardDetailName = document.getElementById('hazardDetailName');
        const hazardDetailIndicator = document.getElementById('hazardDetailIndicator');
        const hazardDetailComments = document.getElementById('hazardDetailComments');
        const hazardDetailPhotoInput = document.getElementById('hazardDetailPhotoInput');
        const hazardDetailPhotoPreview = document.getElementById('hazardDetailPhotoPreview');
        const saveDetailBtn = document.getElementById('saveDetailBtn');
        const clearDetailBtn = document.getElementById('clearDetailBtn');
        const submitBtn = document.getElementById('submitBtn');
        const summaryInfo = document.getElementById('summaryInfo');
        const successModal = document.getElementById('successModal');
        const errorModal = document.getElementById('errorModal');
        
        const centerX = 200;
        const centerY = 200;
        const radius = 160;
        const innerRadius = 60;

        let currentHazard = null;
        const hazardDataMap = new Map();
        let detailPhotos = [];

        function initializeHazardData() {
            energyData.forEach(energy => {
                hazardDataMap.set(energy.name, {
                    color: energy.color,
                    comments: '',
                    photos: []
                });
            });
        }

        function createWheel() {
            const segmentAngle = 360 / energyData.length;
            
            energyData.forEach((energy, index) => {
                const startAngle = (index * segmentAngle - 90) * (Math.PI / 180);
                const endAngle = ((index + 1) * segmentAngle - 90) * (Math.PI / 180);

                const x1 = centerX + innerRadius * Math.cos(startAngle);
                const y1 = centerY + innerRadius * Math.sin(startAngle);
                const x2 = centerX + radius * Math.cos(startAngle);
                const y2 = centerY + radius * Math.sin(startAngle);
                const x3 = centerX + radius * Math.cos(endAngle);
                const y3 = centerY + radius * Math.sin(endAngle);
                const x4 = centerX + innerRadius * Math.cos(endAngle);
                const y4 = centerY + innerRadius * Math.sin(endAngle);

                const largeArc = segmentAngle > 180 ? 1 : 0;

                const pathData = `
                    M ${x1} ${y1}
                    L ${x2} ${y2}
                    A ${radius} ${radius} 0 ${largeArc} 1 ${x3} ${y3}
                    L ${x4} ${y4}
                    A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${x1} ${y1}
                    Z
                `;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData);
                path.setAttribute('fill', energy.color);
                path.setAttribute('stroke', 'white');
                path.setAttribute('stroke-width', '3');
                path.setAttribute('class', 'segment');
                path.addEventListener('click', () => selectHazard(energy));
                path.addEventListener('mouseenter', () => {
                    path.style.opacity = '0.8';
                    path.style.filter = 'brightness(1.1)';
                });
                path.addEventListener('mouseleave', () => {
                    path.style.opacity = '1';
                    path.style.filter = 'brightness(1)';
                });

                canvas.appendChild(path);

                // Add label
                const labelAngle = (startAngle + endAngle) / 2;
                const labelRadius = (radius + innerRadius) / 2;
                const labelX = centerX + labelRadius * Math.cos(labelAngle);
                const labelY = centerY + labelRadius * Math.sin(labelAngle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', labelX);
                text.setAttribute('y', labelY);
                text.setAttribute('class', 'segment-label');
                text.setAttribute('transform', `rotate(${(labelAngle * 180 / Math.PI) + 90} ${labelX} ${labelY})`);
                text.textContent = energy.name;

                canvas.appendChild(text);
            });

            // Create center circle
            const centerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            centerCircle.setAttribute('cx', centerX);
            centerCircle.setAttribute('cy', centerY);
            centerCircle.setAttribute('r', innerRadius);
            centerCircle.setAttribute('fill', '#333');
            centerCircle.setAttribute('stroke', 'white');
            centerCircle.setAttribute('stroke-width', '3');
            centerCircle.setAttribute('class', 'center-circle');
            centerCircle.addEventListener('click', resetHazard);

            canvas.appendChild(centerCircle);

            const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            centerText.setAttribute('x', centerX);
            centerText.setAttribute('y', centerY);
            centerText.setAttribute('class', 'center-text');
            centerText.setAttribute('dominant-baseline', 'middle');
            centerText.textContent = 'Energy';

            canvas.appendChild(centerText);
        }

        function selectHazard(energy) {
            currentHazard = energy.name;
            const hazardData = hazardDataMap.get(energy.name);
            detailPhotos = [...hazardData.photos];

            // Show hazard details section
            hazardDetailsSection.style.display = 'block';
            hazardDetailsSection.style.borderLeftColor = energy.color;
            hazardDetailName.textContent = energy.name;
            hazardDetailIndicator.style.backgroundColor = energy.color;
            hazardDetailComments.value = hazardData.comments;
            
            displayDetailPhotos();

            // Update info panel
            infoPanel.innerHTML = `
                <h2>
                    <span class="color-dot" style="background-color: ${energy.color}"></span>
                    ${energy.name}
                </h2>
                <p>${energy.description}</p>
            `;

            // Scroll to hazard details
            hazardDetailsSection.scrollIntoView({ behavior: 'smooth' });
            updateSummary();
        }

        function resetHazard() {
            currentHazard = null;
            hazardDetailsSection.style.display = 'none';
            detailPhotos = [];
            hazardDetailComments.value = '';
            hazardDetailPhotoPreview.innerHTML = '<div class="no-photos">No photos yet</div>';
            infoPanel.innerHTML = '<div class="welcome-message">Click on any energy type to learn more!</div>';
            updateSummary();
        }

        function displayDetailPhotos() {
            if (detailPhotos.length === 0) {
                hazardDetailPhotoPreview.innerHTML = '<div class="no-photos">No photos yet</div>';
                return;
            }

            hazardDetailPhotoPreview.innerHTML = detailPhotos.map((photo, index) => `
                <div class="photo-item">
                    <img src="${photo.data}" alt="${photo.name}">
                    <button class="remove-btn" onclick="removeDetailPhoto(${index})">×</button>
                </div>
            `).join('');
        }

        window.removeDetailPhoto = function(index) {
            detailPhotos.splice(index, 1);
            displayDetailPhotos();
        };

        // Photo upload for detail section
        hazardDetailPhotoInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    detailPhotos.push({
                        name: file.name,
                        data: event.target.result
                    });
                    displayDetailPhotos();
                };
                reader.readAsDataURL(file);
            });
            e.target.value = '';
        });

        // Save detail hazard
        saveDetailBtn.addEventListener('click', () => {
            if (!currentHazard) return;

            const hazardData = hazardDataMap.get(currentHazard);
            hazardData.comments = hazardDetailComments.value;
            hazardData.photos = [...detailPhotos];

            localStorage.setItem(`hazard-${currentHazard}`, JSON.stringify({
                comments: hazardData.comments,
                photoCount: hazardData.photos.length,
                timestamp: new Date().toLocaleString()
            }));

            alert(`✅ ${currentHazard} data saved!`);
            updateSummary();
        });

        // Clear detail hazard
        clearDetailBtn.addEventListener('click', () => {
            resetHazard();
        });

        // Update summary
        function updateSummary() {
            let hazardsWithData = 0;
            let totalPhotos = 0;

            hazardDataMap.forEach(data => {
                if (data.comments.length > 0) {
                    hazardsWithData++;
                    totalPhotos += data.photos.length;
                }
            });

            if (hazardsWithData === 0) {
                summaryInfo.textContent = 'Ready to submit your hazard assessment?';
            } else {
                summaryInfo.textContent = `${hazardsWithData} hazard${hazardsWithData !== 1 ? 's' : ''} documented with ${totalPhotos} photo${totalPhotos !== 1 ? 's' : ''}`;
            }
        }

        // Submit assessment
        submitBtn.addEventListener('click', async () => {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Sending...';

            try {
                // Prepare assessment data
                const assessment = {
                    timestamp: new Date().toLocaleString(),
                    hazards: []
                };

                hazardDataMap.forEach((data, hazardName) => {
                    if (data.comments.length > 0) {
                        assessment.hazards.push({
                            name: hazardName,
                            comments: data.comments,
                            photoCount: data.photos.length,
                            photos: data.photos
                        });
                    }
                });

                if (assessment.hazards.length === 0) {
                    alert('⚠️ Please add comments to at least one hazard before submitting.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '📤 Send Assessment to Email';
                    return;
                }

                // Send to email service (using FormSubmit or similar)
                const formData = new FormData();
                formData.append('email_to', 'brett.galassi@ppsus.com');
                formData.append('subject', 'Energy Wheel Hazard Assessment');
                formData.append('assessment', JSON.stringify(assessment, null, 2));

                // Using Formspree as an example email service
                const response = await fetch('https://formspree.io/f/mvzezeqd', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Save to localStorage as backup
                    localStorage.setItem('assessment-sent', JSON.stringify(assessment));
                    
                    showSuccessModal();
                    resetHazard();
                    updateSummary();
                } else {
                    throw new Error('Email service error');
                }
            } catch (error) {
                console.error('Error:', error);
                showErrorModal();
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '📤 Send Assessment to Email';
            }
        });

        // Modal functions
        function showSuccessModal() {
            successModal.style.display = 'block';
        }

        function closeSuccessModal() {
            successModal.style.display = 'none';
        }

        function showErrorModal() {
            errorModal.style.display = 'block';
        }

        function closeErrorModal() {
            errorModal.style.display = 'none';
        }

        // Close modal when clicking outside
        window.addEventListener('click', (event) => {
            if (event.target === successModal) {
                closeSuccessModal();
            }
            if (event.target === errorModal) {
                closeErrorModal();
            }
        });

        function loadHazardData() {
            energyData.forEach(energy => {
                const hazardName = energy.name;
                const saved = localStorage.getItem(`hazard-${hazardName}`);
                
                if (saved) {
                    const data = JSON.parse(saved);
                    hazardDataMap.get(hazardName).comments = data.comments;
                }
            });
            updateSummary();
        }

        // Initialize
        initializeHazardData();
        createWheel();
        loadHazardData();
    </script>
</body>
</html>
